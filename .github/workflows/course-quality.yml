name: Course quality gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check JavaScript syntax
        run: find frontend -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Check repository structure
        run: python tests/test_structure.py
      - name: Check database schema and seed data
        run: python tests/test_database_schema.py

