name: Structure check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate required paths
        run: python tests/test_structure.py

